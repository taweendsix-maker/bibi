<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>❤️ สำหรับเบบี๋ ❤️</title>
<style>
    body {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, #ff9a9e, #fad0c4);
        font-family: sans-serif;
        overflow: hidden;
    }

    .box {
        background: white;
        padding: 30px;
        border-radius: 20px;
        text-align: center;
        box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    h1 {
        color: #ff4d6d;
    }

    button {
        padding: 10px 20px;
        margin: 10px;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        font-size: 16px;
    }

    #yes {
        background: #ff4d6d;
        color: white;
    }

    #no {
        background: #ccc;
        position: absolute;
    }
</style>
</head>
<body>

<div class="box">
    <h1>รักเค้ามั้ยเบ้บบบบบ ❤️</h1>
    <button id="yes" onclick="love()">รัก 💕</button>
    <button id="no" onclick="moveButton()">ไม่รัก 😝</button>
</div>

<script>
function love() {
    document.body.innerHTML = `
        <div style="text-align:center;">
            <h1 style="color:#ff4d6d;">รักเบบี๋ที่สุดเยยยย ❤️</h1>
            <p>ไออ้วน 🥰</p>
        </div>
    `;
}

function moveButton() {
    const btn = document.getElementById("no");
    const x = Math.random() * (window.innerWidth - 100);
    const y = Math.random() * (window.innerHeight - 50);
    btn.style.left = x + "px";
    btn.style.top = y + "px";
}
</script>

</body>
</html>
